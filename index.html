<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>広告審査フロー図</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
    background: #f5f4f0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 16px;
  }
  header { text-align: center; margin-bottom: 28px; }
  header h1 { font-size: 22px; font-weight: 600; color: #1a1a1a; margin-bottom: 6px; }
  header p { font-size: 13px; color: #777; }
  .card {
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 2px 16px rgba(0,0,0,0.08);
    padding: 32px 24px;
    width: 100%;
    max-width: 760px;
  }
  svg { width: 100%; height: auto; display: block; }
  .t  { font-family: inherit; font-size: 14px; font-weight: 400; fill: #3d3d3a; }
  .ts { font-family: inherit; font-size: 12px; font-weight: 400; fill: #73726c; }
  .th { font-family: inherit; font-size: 14px; font-weight: 600; fill: #1a1a1a; }
  .lane-green  { fill: #f7fbf3; stroke: #ddeecb; stroke-width: 0.5; }
  .lane-blue   { fill: #f2f8fe; stroke: #cce3f7; stroke-width: 0.5; }
  .lane-purple { fill: #f5f4ff; stroke: #d8d6f9; stroke-width: 0.5; }
  .lane-coral  { fill: #fef6f3; stroke: #f9d8cc; stroke-width: 0.5; }
  footer { margin-top: 24px; font-size: 12px; color: #aaa; }
</style>
</head>
<body>
<header>
  <h1>広告審査 業務フロー図</h1>
  <p>作成者 / 早坂 / 登 / 廣井　4レーン構成</p>
</header>
<div class="card">
<svg viewBox="0 0 680 1100" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#73726c" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arrow-red" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#A32D2D" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arrow-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#639922" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Lane backgrounds -->
<rect x="10"  y="10" width="154" height="1080" rx="8" class="lane-green"/>
<rect x="168" y="10" width="154" height="1080" rx="8" class="lane-blue"/>
<rect x="326" y="10" width="154" height="1080" rx="8" class="lane-purple"/>
<rect x="484" y="10" width="186" height="1080" rx="8" class="lane-coral"/>

<!-- Lane headers -->
<rect x="10"  y="10" width="154" height="36" rx="6" fill="#EAF3DE" stroke="#C0DD97" stroke-width="0.5"/>
<text class="th" x="87"  y="32" text-anchor="middle" dominant-baseline="central" fill="#27500A">作成者</text>
<rect x="168" y="10" width="154" height="36" rx="6" fill="#E6F1FB" stroke="#B5D4F4" stroke-width="0.5"/>
<text class="th" x="245" y="32" text-anchor="middle" dominant-baseline="central" fill="#0C447C">早坂</text>
<rect x="326" y="10" width="154" height="36" rx="6" fill="#EEEDFE" stroke="#CECBF6" stroke-width="0.5"/>
<text class="th" x="403" y="32" text-anchor="middle" dominant-baseline="central" fill="#3C3489">登</text>
<rect x="484" y="10" width="186" height="36" rx="6" fill="#FAECE7" stroke="#F5C4B3" stroke-width="0.5"/>
<text class="th" x="577" y="32" text-anchor="middle" dominant-baseline="central" fill="#712B13">廣井</text>

<!-- Lane dividers -->
<line x1="164" y1="46" x2="164" y2="1082" stroke="#c9c8c0" stroke-width="0.5" stroke-dasharray="4 3"/>
<line x1="322" y1="46" x2="322" y2="1082" stroke="#c9c8c0" stroke-width="0.5" stroke-dasharray="4 3"/>
<line x1="480" y1="46" x2="480" y2="1082" stroke="#c9c8c0" stroke-width="0.5" stroke-dasharray="4 3"/>

<!-- STEP 1 -->
<rect x="22" y="62" width="130" height="44" rx="6" fill="#EAF3DE" stroke="#C0DD97" stroke-width="0.5"/>
<text class="ts" x="87" y="75" text-anchor="middle" dominant-baseline="central" fill="#27500A">STEP 1</text>
<text class="th" x="87" y="93" text-anchor="middle" dominant-baseline="central" fill="#173404">原稿作成</text>
<line x1="87" y1="106" x2="87" y2="124" stroke="#73726c" stroke-width="1" fill="none"/>
<line x1="87" y1="124" x2="245" y2="124" stroke="#73726c" stroke-width="1" fill="none"/>
<line x1="245" y1="124" x2="245" y2="132" stroke="#73726c" stroke-width="1" fill="none" marker-end="url(#arrow)"/>

<!-- STEP 2 -->
<rect x="180" y="132" width="130" height="44" rx="6" fill="#E6F1FB" stroke="#B5D4F4" stroke-width="0.5"/>
<text class="ts" x="245" y="145" text-anchor="middle" dominant-baseline="central" fill="#0C447C">STEP 2</text>
<text class="th" x="245" y="163" text-anchor="middle" dominant-baseline="central" fill="#042C53">プレAI審査</text>
<line x1="245" y1="176" x2="245" y2="204" stroke="#73726c" stroke-width="1" fill="none" marker-end="url(#arrow)"/>

<!-- DECISION: 修正必要？ -->
<polygon points="245,206 285,228 245,250 205,228" fill="#fff" stroke="#378ADD" stroke-width="1"/>
<text class="ts" x="245" y="224" text-anchor="middle" dominant-baseline="central" fill="#185FA5">修正</text>
<text class="ts" x="245" y="237" text-anchor="middle" dominant-baseline="central" fill="#185FA5">必要？</text>
<line x1="245" y1="250" x2="245" y2="268" stroke="#73726c" stroke-width="1" fill="none" marker-end="url(#arrow)"/>
<text class="ts" x="258" y="262" fill="#73726c">通常</text>

<!-- 差し戻し → 作成者 -->
<line x1="205" y1="228" x2="152" y2="228" stroke="#A32D2D" stroke-width="1" fill="none" marker-end="url(#arrow-red)"/>
<text class="ts" x="178" y="220" text-anchor="middle" fill="#A32D2D">差し戻し</text>
<rect x="22" y="206" width="130" height="56" rx="6" fill="#FAECE7" stroke="#F5C4B3" stroke-width="0.5"/>
<text class="ts" x="87" y="218" text-anchor="middle" dominant-baseline="central" fill="#712B13">STEP 3b</text>
<text class="th" x="87" y="234" text-anchor="middle" dominant-baseline="central" fill="#4A1B0C">資料修正</text>
<text class="ts" x="87" y="250" text-anchor="middle" dominant-baseline="central" fill="#712B13">（作成者対応）</text>
<line x1="152" y1="262" x2="152" y2="296" stroke="#A32D2D" stroke-width="1" fill="none"/>
<line x1="152" y1="296" x2="180" y2="296" stroke="#A32D2D" stroke-width="1" fill="none" marker-end="url(#arrow-red)"/>

<!-- STEP 3 -->
<rect x="180" y="268" width="130" height="56" rx="6" fill="#E6F1FB" stroke="#B5D4F4" stroke-width="0.5"/>
<text class="ts" x="245" y="280" text-anchor="middle" dominant-baseline="central" fill="#0C447C">STEP 3</text>
<text class="th" x="245" y="297" text-anchor="middle" dominant-baseline="central" fill="#042C53">資料修正</text>
<text class="ts" x="245" y="313" text-anchor="middle" dominant-baseline="central" fill="#0C447C">修正可否対応</text>
<line x1="245" y1="324" x2="245" y2="358" stroke="#73726c" stroke-width="1" fill="none" marker-end="url(#arrow)"/>

<!-- STEP 4 -->
<rect x="180" y="358" width="130" height="56" rx="6" fill="#E6F1FB" stroke="#B5D4F4" stroke-width="0.5"/>
<text class="ts" x="245" y="370" text-anchor="middle" dominant-baseline="central" fill="#0C447C">STEP 4</text>
<text class="th" x="245" y="387" text-anchor="middle" dominant-baseline="central" fill="#042C53">チェックシート</text>
<text class="ts" x="245" y="403" text-anchor="middle" dominant-baseline="central" fill="#0C447C">作成</text>
<line x1="310" y1="386" x2="338" y2="386" stroke="#73726c" stroke-width="1" fill="none" marker-end="url(#arrow)"/>

<!-- STEP 5: ダブルチェック（登）-->
<rect x="338" y="358" width="130" height="56" rx="6" fill="#EEEDFE" stroke="#CECBF6" stroke-width="0.5"/>
<text class="ts" x="403" y="370" text-anchor="middle" dominant-baseline="central" fill="#3C3489">STEP 5</text>
<text class="th" x="403" y="387" text-anchor="middle" dominant-baseline="central" fill="#26215C">ダブルチェック</text>
<text class="ts" x="403" y="403" text-anchor="middle" dominant-baseline="central" fill="#534AB7">（登）</text>
<line x1="403" y1="414" x2="403" y2="438" stroke="#73726c" stroke-width="1" fill="none"/>
<line x1="403" y1="438" x2="577" y2="438" stroke="#73726c" stroke-width="1" fill="none" marker-end="url(#arrow)"/>

<!-- STEP 6 -->
<rect x="496" y="444" width="162" height="44" rx="6" fill="#FAECE7" stroke="#F5C4B3" stroke-width="0.5"/>
<text class="ts" x="577" y="457" text-anchor="middle" dominant-baseline="central" fill="#712B13">STEP 6</text>
<text class="th" x="577" y="475" text-anchor="middle" dominant-baseline="central" fill="#4A1B0C">各社審査提出</text>

<!-- STEP 7①（並行）-->
<line x1="577" y1="488" x2="577" y2="504" stroke="#639922" stroke-width="1" fill="none" stroke-dasharray="4 3" marker-end="url(#arrow-green)"/>
<rect x="496" y="504" width="162" height="56" rx="6" fill="#EAF3DE" stroke="#C0DD97" stroke-width="0.5"/>
<text class="ts" x="577" y="517" text-anchor="middle" dominant-baseline="central" fill="#27500A">STEP 7①</text>
<text class="th" x="577" y="533" text-anchor="middle" dominant-baseline="central" fill="#173404">審査シート管理</text>
<text class="ts" x="577" y="549" text-anchor="middle" dominant-baseline="central" fill="#3B6D11">提出時</text>
<line x1="577" y1="560" x2="577" y2="588" stroke="#73726c" stroke-width="1" fill="none" marker-end="url(#arrow)"/>

<!-- DECISION: 修正指示あり？ -->
<polygon points="577,590 617,612 577,634 537,612" fill="#fff" stroke="#E24B4A" stroke-width="1"/>
<text class="ts" x="577" y="608" text-anchor="middle" dominant-baseline="central" fill="#A32D2D">修正</text>
<text class="ts" x="577" y="621" text-anchor="middle" dominant-baseline="central" fill="#A32D2D">指示？</text>

<!-- なし → STEP 10 -->
<line x1="577" y1="634" x2="577" y2="960" stroke="#73726c" stroke-width="1" fill="none" marker-end="url(#arrow)"/>
<text class="ts" x="592" y="800" fill="#73726c">なし</text>

<!-- あり → STEP 8（早坂）-->
<line x1="537" y1="612" x2="310" y2="612" stroke="#A32D2D" stroke-width="1" fill="none" marker-end="url(#arrow-red)"/>
<text class="ts" x="420" y="604" text-anchor="middle" fill="#A32D2D">修正指示あり</text>

<!-- STEP 8 -->
<rect x="180" y="618" width="130" height="56" rx="6" fill="#E6F1FB" stroke="#B5D4F4" stroke-width="0.5"/>
<text class="ts" x="245" y="631" text-anchor="middle" dominant-baseline="central" fill="#0C447C">STEP 8</text>
<text class="th" x="245" y="647" text-anchor="middle" dominant-baseline="central" fill="#042C53">各社修正対応</text>
<text class="ts" x="245" y="663" text-anchor="middle" dominant-baseline="central" fill="#0C447C">（早坂）</text>

<!-- 再差し戻し（任意）-->
<line x1="180" y1="638" x2="152" y2="638" stroke="#A32D2D" stroke-width="1" fill="none" stroke-dasharray="3 2" marker-end="url(#arrow-red)"/>
<rect x="22" y="618" width="130" height="56" rx="6" fill="none" stroke="#A32D2D" stroke-width="0.5" stroke-dasharray="4 3"/>
<text class="ts" x="87" y="634" text-anchor="middle" dominant-baseline="central" fill="#A32D2D">再差し戻し</text>
<text class="ts" x="87" y="650" text-anchor="middle" dominant-baseline="central" fill="#A32D2D">（必要時のみ）</text>

<!-- STEP 8 → STEP 8b（登）-->
<line x1="245" y1="674" x2="245" y2="700" stroke="#73726c" stroke-width="1" fill="none"/>
<line x1="245" y1="700" x2="338" y2="700" stroke="#73726c" stroke-width="1" fill="none" marker-end="url(#arrow)"/>

<!-- STEP 8b: ダブルチェック（登）-->
<rect x="338" y="706" width="130" height="56" rx="6" fill="#EEEDFE" stroke="#CECBF6" stroke-width="0.5"/>
<text class="ts" x="403" y="719" text-anchor="middle" dominant-baseline="central" fill="#3C3489">STEP 8b</text>
<text class="th" x="403" y="736" text-anchor="middle" dominant-baseline="central" fill="#26215C">ダブルチェック</text>
<text class="ts" x="403" y="752" text-anchor="middle" dominant-baseline="central" fill="#534AB7">（登）</text>

<!-- STEP 8b → STEP 8c（廣井）-->
<line x1="403" y1="762" x2="403" y2="800" stroke="#73726c" stroke-width="1" fill="none"/>
<line x1="403" y1="800" x2="496" y2="800" stroke="#73726c" stroke-width="1" fill="none" marker-end="url(#arrow)"/>

<!-- STEP 8c: 修正分 再提出（廣井）-->
<rect x="496" y="806" width="162" height="56" rx="6" fill="#FAECE7" stroke="#F5C4B3" stroke-width="0.5"/>
<text class="ts" x="577" y="819" text-anchor="middle" dominant-baseline="central" fill="#712B13">STEP 8c</text>
<text class="th" x="577" y="836" text-anchor="middle" dominant-baseline="central" fill="#4A1B0C">修正分 再提出</text>
<text class="ts" x="577" y="852" text-anchor="middle" dominant-baseline="central" fill="#712B13">（廣井）</text>

<!-- STEP 8c → ループ（STEP 6へ）-->
<line x1="577" y1="862" x2="577" y2="890" stroke="#73726c" stroke-width="0.5" fill="none" stroke-dasharray="3 3"/>
<line x1="577" y1="890" x2="648" y2="890" stroke="#73726c" stroke-width="0.5" fill="none" stroke-dasharray="3 3"/>
<line x1="648" y1="890" x2="648" y2="466" stroke="#73726c" stroke-width="0.5" fill="none" stroke-dasharray="3 3"/>
<line x1="648" y1="466" x2="658" y2="466" stroke="#73726c" stroke-width="0.5" fill="none" stroke-dasharray="3 3" marker-end="url(#arrow)"/>
<text class="ts" x="655" y="494" fill="#73726c">再</text>
<text class="ts" x="655" y="508" fill="#73726c">審</text>
<text class="ts" x="655" y="522" fill="#73726c">査</text>

<!-- STEP 10 -->
<rect x="496" y="960" width="162" height="44" rx="6" fill="#FAECE7" stroke="#F5C4B3" stroke-width="0.5"/>
<text class="ts" x="577" y="973" text-anchor="middle" dominant-baseline="central" fill="#712B13">STEP 10</text>
<text class="th" x="577" y="991" text-anchor="middle" dominant-baseline="central" fill="#4A1B0C">完了物の格納</text>

<!-- STEP 7②（並行）-->
<line x1="577" y1="1004" x2="577" y2="1020" stroke="#639922" stroke-width="1" fill="none" stroke-dasharray="4 3" marker-end="url(#arrow-green)"/>
<rect x="496" y="1020" width="162" height="56" rx="6" fill="#EAF3DE" stroke="#C0DD97" stroke-width="0.5"/>
<text class="ts" x="577" y="1033" text-anchor="middle" dominant-baseline="central" fill="#27500A">STEP 7②</text>
<text class="th" x="577" y="1049" text-anchor="middle" dominant-baseline="central" fill="#173404">審査シート管理</text>
<text class="ts" x="577" y="1065" text-anchor="middle" dominant-baseline="central" fill="#3B6D11">格納時</text>

<!-- END -->
<line x1="577" y1="1076" x2="577" y2="1088" stroke="#73726c" stroke-width="1" fill="none" marker-end="url(#arrow)"/>
<rect x="515" y="1088" width="124" height="0" rx="0" fill="none"/>

<!-- LEGEND -->
<rect x="12" y="880" width="470" height="52" rx="8" fill="#f5f4f0" stroke="#c9c8c0" stroke-width="0.5"/>
<text class="ts" x="24" y="897" fill="#73726c">凡例</text>
<line x1="60"  y1="914" x2="88"  y2="914" stroke="#73726c" stroke-width="1" fill="none" marker-end="url(#arrow)"/>
<text class="ts" x="94" y="918" fill="#73726c">通常フロー</text>
<line x1="190" y1="914" x2="218" y2="914" stroke="#A32D2D" stroke-width="1" fill="none" marker-end="url(#arrow-red)"/>
<text class="ts" x="224" y="918" fill="#A32D2D">差し戻し</text>
<line x1="310" y1="914" x2="338" y2="914" stroke="#639922" stroke-width="1" fill="none" stroke-dasharray="4 3" marker-end="url(#arrow-green)"/>
<text class="ts" x="344" y="918" fill="#3B6D11">並行タスク</text>
<line x1="420" y1="914" x2="448" y2="914" stroke="#73726c" stroke-width="0.5" fill="none" stroke-dasharray="3 3" marker-end="url(#arrow)"/>
<text class="ts" x="454" y="918" fill="#73726c">条件ループ</text>
</svg>
</div>
<footer>広告審査フロー図 — ダブルクリックでブラウザ表示</footer>
</body>
</html>
